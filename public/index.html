<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ranking de Digitação</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    /* ── Reset & Variables ─────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0b0c0f;
      --surface:   #13151a;
      --border:    #1e2028;
      --accent:    #ff58ae;
      --accent2:   #47ffe8;
      --muted:     #4a4f60;
      --text:      #d6dae8;
      --text-dim:  #6b7280;
      --gold:      #ffd166;
      --silver:    #a8b2c8;
      --bronze:    #cd7c4a;
      --danger:    #ff4757;
      --radius:    6px;
      --mono:      'Space Mono', monospace;
      --sans:      'Syne', sans-serif;
    }

    html { font-size: 16px; scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Noise texture overlay ──────────────────────────────── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: .4;
    }

    /* ── Grid scanlines ─────────────────────────────────────── */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(255,255,255,.012) 2px,
        rgba(255,255,255,.012) 4px
      );
      pointer-events: none;
      z-index: 0;
    }

    /* ── Layout wrapper ─────────────────────────────────────── */
    .wrapper {
      position: relative;
      z-index: 1;
      max-width: 900px;
      margin: 0 auto;
      padding: 3rem 1.5rem 6rem;
    }

    /* ── Header ─────────────────────────────────────────────── */
    header {
      margin-bottom: 3rem;
    }

    .header-eyebrow {
      font-family: var(--mono);
      font-size: .7rem;
      letter-spacing: .2em;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: .6rem;
      opacity: .8;
    }

    h1 {
      font-family: var(--sans);
      font-weight: 800;
      font-size: clamp(2rem, 6vw, 3.6rem);
      line-height: 1.05;
      letter-spacing: -.02em;
      color: #fff;
    }

    h1 span {
      color: var(--accent);
    }

    .header-sub {
      margin-top: .75rem;
      font-size: .875rem;
      color: var(--text-dim);
      font-family: var(--mono);
    }

    /* ── Search / autocomplete ──────────────────────────────── */
    .search-wrap {
      position: relative;
      margin-bottom: 2.5rem;
    }

    .search-label {
      display: block;
      font-size: .75rem;
      font-family: var(--mono);
      letter-spacing: .12em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: .5rem;
    }

    .search-input-row {
      display: flex;
      gap: .75rem;
      align-items: center;
    }

    #turmaInput {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: .75rem 1rem;
      font-family: var(--mono);
      font-size: .95rem;
      color: var(--text);
      outline: none;
      transition: border-color .2s, box-shadow .2s;
    }

    #turmaInput:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(255,88,174,.08);
    }

    #turmaInput::placeholder { color: var(--muted); }

    #suggestions {
      position: absolute;
      top: calc(100% + 4px);
      left: 0;
      right: 0;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      z-index: 100;
      display: none;
      box-shadow: 0 8px 32px rgba(0,0,0,.5);
    }

    #suggestions.open { display: block; }

    .suggestion-item {
      padding: .65rem 1rem;
      font-family: var(--mono);
      font-size: .9rem;
      cursor: pointer;
      transition: background .15s;
      border-bottom: 1px solid var(--border);
    }

    .suggestion-item:last-child { border-bottom: none; }

    .suggestion-item:hover,
    .suggestion-item.active {
      background: rgba(255,88,174,.07);
      color: var(--accent);
    }

    /* ── Status / error messages ────────────────────────────── */
    #statusMsg {
      font-family: var(--mono);
      font-size: .8rem;
      color: var(--text-dim);
      min-height: 1.2em;
      margin-bottom: 1.5rem;
    }

    #statusMsg.error { color: var(--danger); }

    /* ── Section title ──────────────────────────────────────── */
    #sectionTitle {
      display: none;
      align-items: baseline;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    #sectionTitle.visible { display: flex; }

    #sectionTitle h2 {
      font-weight: 800;
      font-size: 1.6rem;
      letter-spacing: -.02em;
    }

    #sectionTitle .badge {
      font-family: var(--mono);
      font-size: .7rem;
      padding: .2rem .6rem;
      border-radius: 999px;
      background: rgba(255,88,174,.1);
      color: var(--accent);
      letter-spacing: .08em;
      border: 1px solid rgba(255,88,174,.2);
    }

    /* ── Ranking table ──────────────────────────────────────── */
    .ranking-container {
      animation: fadeUp .35s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .ranking-table {
      width: 100%;
      border-collapse: collapse;
    }

    .ranking-table thead tr {
      border-bottom: 1px solid var(--border);
    }

    .ranking-table th {
      font-family: var(--mono);
      font-size: .65rem;
      letter-spacing: .15em;
      text-transform: uppercase;
      color: var(--muted);
      padding: .5rem 1rem;
      text-align: left;
      font-weight: 400;
    }

    .ranking-table th:last-child { text-align: right; }

    .ranking-table tbody tr {
      border-bottom: 1px solid rgba(30,32,40,.8);
      transition: background .15s;
    }

    .ranking-table tbody tr:hover {
      background: rgba(255,255,255,.025);
    }

    .ranking-table td {
      padding: .9rem 1rem;
      font-size: .9rem;
      vertical-align: middle;
    }

    /* Position cell */
    .td-pos {
      font-family: var(--mono);
      font-size: .85rem;
      color: var(--muted);
      width: 3rem;
    }

    .pos-medal {
      font-size: 1.1rem;
    }

    /* Name cell */
    .td-name {
      font-weight: 600;
      font-size: .95rem;
    }

    .td-username {
      font-family: var(--mono);
      font-size: .72rem;
      color: var(--muted);
      display: block;
      margin-top: .1rem;
    }

    /* Date cell */
    .td-date {
      font-family: var(--mono);
      font-size: .75rem;
      color: var(--text-dim);
    }

    /* WPM cell */
    .td-wpm {
      text-align: right;
    }

    .wpm-value {
      font-family: var(--mono);
      font-size: 1.35rem;
      font-weight: 700;
      letter-spacing: -.02em;
    }

    .wpm-label {
      font-family: var(--mono);
      font-size: .6rem;
      color: var(--muted);
      letter-spacing: .1em;
      display: block;
      text-transform: uppercase;
      text-align: right;
    }

    /* WPM bar */
    .wpm-bar-wrap {
      width: 100%;
      height: 3px;
      background: var(--border);
      border-radius: 999px;
      margin-top: .35rem;
      overflow: hidden;
    }

    .wpm-bar {
      height: 100%;
      border-radius: 999px;
      background: var(--accent);
      transition: width .6s cubic-bezier(.25,.46,.45,.94);
    }

    /* Top 3 row styles */
    tbody tr:nth-child(1) .wpm-value { color: var(--gold); }
    tbody tr:nth-child(1) .wpm-bar   { background: var(--gold); }
    tbody tr:nth-child(2) .wpm-value { color: var(--silver); }
    tbody tr:nth-child(2) .wpm-bar   { background: var(--silver); }
    tbody tr:nth-child(3) .wpm-value { color: var(--bronze); }
    tbody tr:nth-child(3) .wpm-bar   { background: var(--bronze); }

    /* ── Empty state ────────────────────────────────────────── */
    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
      border: 1px dashed var(--border);
      border-radius: var(--radius);
    }

    .empty-icon {
      font-size: 2.5rem;
      margin-bottom: 1rem;
      opacity: .4;
    }

    .empty-text {
      font-family: var(--mono);
      font-size: .8rem;
      color: var(--muted);
    }

    /* ── Loader ─────────────────────────────────────────────── */
    .loader {
      display: flex;
      align-items: center;
      gap: .75rem;
      font-family: var(--mono);
      font-size: .8rem;
      color: var(--muted);
      padding: 2rem 0;
    }

    .loader-dots span {
      display: inline-block;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
      animation: blink 1.2s infinite;
      margin-right: 4px;
    }

    .loader-dots span:nth-child(2) { animation-delay: .2s; }
    .loader-dots span:nth-child(3) { animation-delay: .4s; }

    @keyframes blink {
      0%, 80%, 100% { opacity: .15; transform: scale(.8); }
      40%           { opacity: 1;   transform: scale(1); }
    }

    /* ── Footer ─────────────────────────────────────────────── */
    footer {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      padding: .75rem 1.5rem;
      background: linear-gradient(to top, var(--bg) 60%, transparent);
      font-family: var(--mono);
      font-size: .65rem;
      color: var(--muted);
      text-align: center;
      letter-spacing: .08em;
    }

    /* ── Responsive ─────────────────────────────────────────── */
    @media (max-width: 600px) {
      .td-date { display: none; }
      .ranking-table th:nth-child(3) { display: none; }
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <!-- Header -->
    <header>
      <p class="header-eyebrow">// monkeytype ranking</p>
      <h1>Ranking de<br><span>Digitação</span></h1>
      <p class="header-sub">Professor Lucas Eduardo Batista Ferreira</p>
    </header>

    <!-- Search -->
    <div class="search-wrap">
      <label class="search-label" for="turmaInput">selecionar turma</label>
      <div class="search-input-row">
        <input
          id="turmaInput"
          type="text"
          placeholder="Digite ou escolha uma turma…"
          autocomplete="off"
        />
      </div>
      <div id="suggestions"></div>
    </div>

    <!-- Status message -->
    <p id="statusMsg"></p>

    <!-- Section title -->
    <div id="sectionTitle">
      <h2 id="sectionTitleText"></h2>
      <span class="badge" id="countBadge"></span>
    </div>

    <!-- Ranking output -->
    <div id="rankingOutput"></div>
  </div>

  <footer>Feito com <3 pelo Professor Lucas</footer>

  <script>
    // ── State ──────────────────────────────────────────────────────────────────
    let allTurmas       = [];
    let activeSuggIdx   = -1;
    let currentTurma    = null;

    const input       = document.getElementById('turmaInput');
    const suggestBox  = document.getElementById('suggestions');
    const statusMsg   = document.getElementById('statusMsg');
    const rankingOut  = document.getElementById('rankingOutput');
    const sectionTitle= document.getElementById('sectionTitle');
    const titleText   = document.getElementById('sectionTitleText');
    const countBadge  = document.getElementById('countBadge');

    // ── Boot: fetch turma list ─────────────────────────────────────────────────
    async function init() {
      try {
        const res  = await fetch('/api/turmas');
        const data = await res.json();
        allTurmas  = data.turmas || [];

        if (allTurmas.length === 0) {
          setStatus('Nenhuma turma encontrada. Execute o script de atualização primeiro.');
        }
      } catch (e) {
        setStatus('Erro ao conectar com o servidor.', true);
      }
    }

    // ── Status helper ──────────────────────────────────────────────────────────
    function setStatus(msg, isError = false) {
      statusMsg.textContent = msg;
      statusMsg.className   = isError ? 'error' : '';
    }

    // ── Autocomplete ───────────────────────────────────────────────────────────
    function renderSuggestions(query) {
      const filtered = query
        ? allTurmas.filter(t => t.toLowerCase().includes(query.toLowerCase()))
        : allTurmas;

      if (filtered.length === 0) {
        suggestBox.innerHTML = '';
        suggestBox.classList.remove('open');
        return;
      }

      suggestBox.innerHTML = filtered.map((t, i) =>
        `<div class="suggestion-item" data-idx="${i}" data-turma="${t}">${t}</div>`
      ).join('');

      suggestBox.classList.add('open');
      activeSuggIdx = -1;

      // Click on suggestion
      suggestBox.querySelectorAll('.suggestion-item').forEach(el => {
        el.addEventListener('mousedown', e => {
          e.preventDefault();
          selectTurma(el.dataset.turma);
        });
      });
    }

    function closeSuggestions() {
      suggestBox.classList.remove('open');
      suggestBox.innerHTML = '';
      activeSuggIdx = -1;
    }

    function selectTurma(turma) {
      input.value  = turma;
      currentTurma = turma;
      closeSuggestions();
      loadRanking(turma);
    }

    // Keyboard navigation for suggestions
    input.addEventListener('keydown', e => {
      const items = suggestBox.querySelectorAll('.suggestion-item');
      if (!items.length) return;

      if (e.key === 'ArrowDown') {
        e.preventDefault();
        activeSuggIdx = Math.min(activeSuggIdx + 1, items.length - 1);
        updateActive(items);
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        activeSuggIdx = Math.max(activeSuggIdx - 1, 0);
        updateActive(items);
      } else if (e.key === 'Enter') {
        e.preventDefault();
        if (activeSuggIdx >= 0) selectTurma(items[activeSuggIdx].dataset.turma);
        else if (items.length === 1) selectTurma(items[0].dataset.turma);
      } else if (e.key === 'Escape') {
        closeSuggestions();
      }
    });

    function updateActive(items) {
      items.forEach((el, i) => el.classList.toggle('active', i === activeSuggIdx));
    }

    input.addEventListener('input', () => renderSuggestions(input.value));
    input.addEventListener('focus', () => renderSuggestions(input.value));
    document.addEventListener('click', e => {
      if (!e.target.closest('.search-wrap')) closeSuggestions();
    });

    // ── Load & render ranking ──────────────────────────────────────────────────
    async function loadRanking(turma) {
      setStatus('');
      rankingOut.innerHTML  = loaderHTML();
      sectionTitle.classList.remove('visible');

      try {
        const res  = await fetch(`/api/ranking/${encodeURIComponent(turma)}`);
        const data = await res.json();

        if (!res.ok) {
          rankingOut.innerHTML = '';
          setStatus(data.error || 'Erro desconhecido.', true);
          return;
        }

        renderRanking(turma, data.ranking || []);
      } catch (e) {
        rankingOut.innerHTML = '';
        setStatus('Erro ao buscar ranking.', true);
      }
    }

    function loaderHTML() {
      return `
        <div class="loader">
          <div class="loader-dots">
            <span></span><span></span><span></span>
          </div>
          carregando ranking…
        </div>`;
    }

    function renderRanking(turma, entries) {
      // Update section title
      titleText.textContent = `Turma ${turma}`;
      countBadge.textContent = `${entries.length} aluno${entries.length !== 1 ? 's' : ''}`;
      sectionTitle.classList.add('visible');

      if (entries.length === 0) {
        rankingOut.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">⌨️</div>
            <p class="empty-text">Nenhum aluno com registros válidos nos últimos 90 dias.</p>
          </div>`;
        return;
      }

      const maxWpm = entries[0].wpm; // Already sorted desc

      const medals = ['🥇','🥈','🥉'];

      const rows = entries.map((e, i) => {
        const pct  = maxWpm > 0 ? Math.round((e.wpm / maxWpm) * 100) : 0;
        const pos  = i < 3
          ? `<span class="pos-medal">${medals[i]}</span>`
          : `<span>${i + 1}</span>`;
        const date = e.timestamp
          ? new Date(e.timestamp).toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit', year: '2-digit' })
          : '—';

        return `
          <tr>
            <td class="td-pos">${pos}</td>
            <td class="td-name">
              ${escHtml(e.displayName)}
              <span class="td-username">@${escHtml(e.username)}</span>
            </td>
            <td class="td-date">${date}</td>
            <td class="td-wpm">
              <span class="wpm-value">${e.wpm}</span>
              <span class="wpm-label">wpm</span>
              <div class="wpm-bar-wrap">
                <div class="wpm-bar" style="width:${pct}%"></div>
              </div>
            </td>
          </tr>`;
      }).join('');

      rankingOut.innerHTML = `
        <div class="ranking-container">
          <table class="ranking-table">
            <thead>
              <tr>
                <th>#</th>
                <th>Aluno</th>
                <th>Melhor em</th>
                <th>WPM</th>
              </tr>
            </thead>
            <tbody>${rows}</tbody>
          </table>
        </div>`;
    }

    // ── Utility ────────────────────────────────────────────────────────────────
    function escHtml(str) {
      return String(str)
        .replace(/&/g,'&amp;')
        .replace(/</g,'&lt;')
        .replace(/>/g,'&gt;')
        .replace(/"/g,'&quot;');
    }

    // ── Init ───────────────────────────────────────────────────────────────────
    init();
  </script>
</body>
</html>
