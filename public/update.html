<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<title>Atualizar Ranking</title>

<style>

body{
    font-family: monospace;
    background:#111;
    color:#eee;
    padding:30px;
}

input,select,button{
    padding:8px;
    margin:5px;
    font-size:14px;
}

button{
    cursor:pointer;
}

#log{
    margin-top:20px;
    background:#000;
    padding:20px;
    border-radius:6px;
    height:400px;
    overflow:auto;
    white-space:pre-wrap;
}

</style>

</head>

<body>

<h2>Atualizar Ranking Monkeytype</h2>

<label>Turma</label>
<select id="turma"></select>

<br>

<label>Senha</label>
<input type="password" id="senha">

<button onclick="executar()">Atualizar Ranking</button>

<pre id="log"></pre>

<script>

const log = document.getElementById("log")

function append(text){
    log.textContent += text + "\n"
    log.scrollTop = log.scrollHeight
}

async function carregarTurmas(){

    const res = await fetch("/api/admin/turmas")
    const data = await res.json()

    const select = document.getElementById("turma")

    select.innerHTML = ""

    data.turmas.forEach(turma=>{
        const opt = document.createElement("option")
        opt.value = turma
        opt.textContent = turma
        select.appendChild(opt)
    })

}

function executar(){

    log.textContent = ""

    const turma = document.getElementById("turma").value
    const senha = document.getElementById("senha").value

    const url = `/api/admin/update-ranking-stream?turma=${encodeURIComponent(turma)}`

    const evt = new EventSource(url, {
        withCredentials:false
    })

    fetch(url,{
        headers:{
            "x-admin-key":senha
        }
    })

    evt.onmessage = e => append(e.data)

    evt.onerror = () => {
        append("Conexão encerrada.")
        evt.close()
    }

}

carregarTurmas()

</script>

</body>
</html>
